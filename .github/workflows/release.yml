name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

jobs:
  # --- Rust ---
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Check format
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Audit
        run: cargo audit

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.0
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Deny
        run: cargo deny check advisories bans sources

  build:
    name: Build test binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build test binaries
        # Match CI: sql+delta only. --all-features links every JDBC backend and can
        # OOM on ubuntu-latest (ld bus error) when examples/tests link in parallel.
        run: cargo build --workspace --features sql,delta --tests
        env:
          CARGO_BUILD_JOBS: 1

  test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run Rust tests
        # Skip doctests/examples: linking merged targets with sql+delta can OOM on
        # ubuntu-latest (ld bus error). Examples are exercised under --features sql in CI.
        run: cargo test --workspace --features sql,delta --lib --tests
        timeout-minutes: 25
        env:
          CARGO_BUILD_JOBS: 1

  publish:
    name: Build docs and publish to crates.io
    runs-on: ubuntu-latest
    needs: [format, clippy, audit, deny, build, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build docs
        run: cargo doc --workspace --no-deps
      - name: "Publish to crates.io (dependency order: spark-sql-parser, core, polars, main)"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish_one() {
            local crate="$1"
            local out
            local code
            set +e
            out=$(cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" 2>&1)
            code=$?
            set -e
            printf '%s\n' "$out"
            if [ "$code" -eq 0 ]; then
              return 0
            fi
            # cargo uses exit 101 for many failures; only skip true duplicates.
            if printf '%s\n' "$out" | grep -Eqi 'already uploaded|already exists'; then
              echo "$crate version already on crates.io, skipping"
              return 0
            fi
            echo "cargo publish -p $crate failed with exit $code"
            return "$code"
          }

          publish_one spark-sql-parser
          publish_one robin-sparkless-core
          publish_one robin-sparkless-polars
          publish_one robin-sparkless
       
  # --- Python (lint + tests, then PyPI publish for 3.8+) ---
  python-lint:
    name: Python (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install mypy
        run: pip install mypy
      - name: Mypy
        run: cd python && mypy sparkless

  python-build:
    name: Python build extension - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-py-build-
      - name: Install maturin
        run: pip install maturin
      - name: Work around rustup proxy conflicts (maturin)
        run: |
          rm -f ~/.cargo/bin/cargo-fmt ~/.cargo/bin/rustfmt
          rustup component remove rustfmt clippy --toolchain 1.93.1 2>/dev/null || true
          rustup component add rustfmt clippy --toolchain 1.93.1
      - name: Build wheel (abi3, Python 3.8+)
        run: cd python && maturin build --release -i 3.8
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sparkless-wheel-${{ matrix.os }}
          path: target/wheels/*.whl

  python-tests:
    name: Python tests - ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: [python-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv
        run: python -m venv .venv
      - name: Set Python path
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PY=$GITHUB_WORKSPACE/.venv/Scripts/python" >> $GITHUB_ENV
          else
            echo "PY=$GITHUB_WORKSPACE/.venv/bin/python" >> $GITHUB_ENV
          fi
      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: sparkless-wheel-${{ matrix.os }}
          path: dist
      - name: Install wheel and test deps
        run: |
          $PY -m pip install dist/*.whl
          $PY -m pip install pytest pytest-xdist hypothesis pytest-timeout
      - name: Smoke test
        run: $PY -c "from sparkless.sql import SparkSession; from sparkless.sql.functions import col; s = SparkSession.builder.app_name('test').get_or_create(); df = s.create_dataframe([(1, 2, 'a')], ['x', 'y', 'z']); assert df.count() == 1; print('sparkless OK')"
      - name: Run Python tests (same subset as CI)
        run: |
          $PY -m pytest tests --ignore=tests/parity -m "not delta and not integration" -n 4 -v --tb=short --timeout 90
          $PY -m pytest tests/parity/ -v --tb=short --timeout 90
        timeout-minutes: 20

  # PyPI: build and publish wheels (Python 3.8+), after all checks pass
  publish-pypi-manylinux-x86_64:
    name: PyPI manylinux x86_64 + sdist
    runs-on: ubuntu-latest
    needs: [format, clippy, audit, deny, build, test, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Publish to PyPI (maturin)
        uses: messense/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          target: x86_64-unknown-linux-gnu
          command: publish
          args: --manifest-path python/Cargo.toml -i 3.8 --zig --skip-existing
          manylinux: "2_17"
          container: off

  publish-pypi-manylinux-aarch64:
    name: PyPI manylinux aarch64
    runs-on: ubuntu-24.04-arm
    needs: [format, clippy, audit, deny, build, test, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Publish to PyPI (maturin)
        uses: messense/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          target: aarch64-unknown-linux-gnu
          command: publish
          args: --manifest-path python/Cargo.toml -i 3.8 --zig --skip-existing
          manylinux: "2_28"
          container: off

  publish-pypi-mac:
    name: PyPI macOS ${{ matrix.target }}
    runs-on: macos-latest
    needs: [format, clippy, audit, deny, build, test, python-lint, python-tests]
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - name: Publish to PyPI (maturin)
        uses: messense/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          target: ${{ matrix.target }}
          command: publish
          args: --manifest-path python/Cargo.toml -i 3.8 --skip-existing

  publish-pypi-musllinux-x86_64:
    name: PyPI musllinux x86_64
    runs-on: ubuntu-latest
    needs: [format, clippy, audit, deny, build, test, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Publish to PyPI (maturin)
        uses: messense/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          target: x86_64-unknown-linux-musl
          command: publish
          args: --manifest-path python/Cargo.toml -i 3.8 --zig --compatibility musllinux_1_2 --skip-existing

  publish-pypi-musllinux-aarch64:
    name: PyPI musllinux aarch64
    runs-on: ubuntu-24.04-arm
    needs: [format, clippy, audit, deny, build, test, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Publish to PyPI (maturin)
        continue-on-error: true
        uses: messense/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          target: aarch64-unknown-linux-musl
          command: publish
          args: --manifest-path python/Cargo.toml -i 3.8 --zig --compatibility musllinux_1_2 --skip-existing
      - name: Retry publish to PyPI (maturin)
        if: failure()
        uses: messense/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          target: aarch64-unknown-linux-musl
          command: publish
          args: --manifest-path python/Cargo.toml -i 3.8 --zig --compatibility musllinux_1_2 --skip-existing

  publish-pypi-windows-x86_64:
    name: PyPI Windows x86_64
    runs-on: windows-latest
    needs: [format, clippy, audit, deny, build, test, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Publish to PyPI (maturin)
        uses: messense/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          target: x86_64-pc-windows-msvc
          command: publish
          args: --manifest-path python/Cargo.toml -i 3.8 --skip-existing

  publish-pypi-windows-arm64:
    name: PyPI Windows aarch64
    runs-on: windows-11-arm
    needs: [format, clippy, audit, deny, build, test, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Publish to PyPI (maturin)
        uses: messense/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          target: aarch64-pc-windows-msvc
          command: publish
          args: --manifest-path python/Cargo.toml -i 3.8 --skip-existing
