# IBM DB2 service for local JDBC integration tests.
#
# NOTE: Running DB2 in Docker requires significant memory/resources.
# The ibmcom/db2 image is large (~2GB) and may take several minutes to start.
#
# Prerequisites:
#   - Install an ODBC driver manager: `brew install unixodbc` (macOS) or `apt install unixodbc-dev` (Linux)
#   - Install the IBM DB2 ODBC driver or use the DSN configured below
#
# Start:   docker compose -f docker-compose.jdbc.db2.yml up -d
# Stop:    docker compose -f docker-compose.jdbc.db2.yml down
#
# Then set:
#   export SPARKLESS_TEST_JDBC_DB2_URL="jdbc:db2://localhost:50000/SPARKDB"
#   export SPARKLESS_TEST_JDBC_DB2_USER=db2inst1
#   export SPARKLESS_TEST_JDBC_DB2_PASSWORD=password
#
# Create tables:
#   docker exec -i sparkless-db2 su - db2inst1 -c "db2 connect to SPARKDB && db2 -tvf /dev/stdin" < tests/sql/ddl/db2.sql

services:
  db2:
    image: ibmcom/db2:11.5.8.0
    container_name: sparkless-db2
    privileged: true
    environment:
      LICENSE: accept
      DB2INSTANCE: db2inst1
      DB2INST1_PASSWORD: password
      DBNAME: SPARKDB
      ARCHIVE_LOGS: "false"
      AUTOCONFIG: "false"
    ports:
      - "50000:50000"
    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c 'db2 connect to SPARKDB'"]
      interval: 30s
      timeout: 30s
      retries: 20
