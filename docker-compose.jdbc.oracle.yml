# Oracle XE service for local JDBC integration tests.
#
# NOTE: The official Oracle container images require a manual pull/login from container-registry.oracle.com.
# An alternative is gvenzl/oracle-xe or gvenzl/oracle-free.
#
# Start:   docker compose -f docker-compose.jdbc.oracle.yml up -d
# Stop:    docker compose -f docker-compose.jdbc.oracle.yml down
#
# Then set:
#   export SPARKLESS_TEST_JDBC_ORACLE_URL="jdbc:oracle:thin:@//localhost:1521/FREEPDB1"
#   export SPARKLESS_TEST_JDBC_ORACLE_USER=system
#   export SPARKLESS_TEST_JDBC_ORACLE_PASSWORD=oracle
#
# Create tables:
#   docker exec -i sparkless-oracle sqlplus system/oracle@FREEPDB1 < tests/sql/ddl/oracle.sql

services:
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: sparkless-oracle
    environment:
      ORACLE_PASSWORD: oracle
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
