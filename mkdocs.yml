# MkDocs configuration for Read the Docs and local builds
# https://www.mkdocs.org/user-guide/configuration/

site_name: Sparkless / Robin Sparkless
site_description: PySpark-compatible DataFrames without the JVM — Python testing and Rust embedding on Polars
site_url: https://robin-sparkless.readthedocs.io/
repo_url: https://github.com/eddiethedean/robin-sparkless
repo_name: eddiethedean/robin-sparkless
edit_uri: edit/main/docs/
copyright: Robin Sparkless contributors

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

