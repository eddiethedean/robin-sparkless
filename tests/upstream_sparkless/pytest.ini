# Pytest config for vendored upstream sparkless tests.
# Run from repo root: pytest tests/upstream_sparkless
# Default run excludes heavy categories; use -m "" or -m delta to include.

[pytest]
testpaths = tests
markers =
    delta: mark test as requiring Delta Lake (may be skipped)
    performance: mark test as a performance benchmark
    compatibility: mark test as compatibility test using expected outputs
    unit: mark test as unit test (no external dependencies)
    timeout: mark tests that rely on pytest-timeout
    backend(mock|pyspark|both|robin): mark test to run with specific backend(s)
    serial: mark test as serial (no parallel)
filterwarnings =
    ignore::pytest.PytestDeprecationWarning
