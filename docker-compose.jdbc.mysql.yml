# MySQL service for local JDBC integration tests.
#
# Start:   docker compose -f docker-compose.jdbc.mysql.yml up -d
# Stop:    docker compose -f docker-compose.jdbc.mysql.yml down
#
# Then set:
#   export SPARKLESS_TEST_JDBC_MYSQL_URL="jdbc:mysql://localhost:3306/sparkless"
#   export SPARKLESS_TEST_JDBC_MYSQL_USER=sparkless
#   export SPARKLESS_TEST_JDBC_MYSQL_PASSWORD=sparkless
#
# Create tables:
#   docker exec -i sparkless-mysql mysql -usparkless -psparkless sparkless < tests/sql/ddl/mysql.sql

services:
  mysql:
    image: mysql:8.0
    container_name: sparkless-mysql
    environment:
      MYSQL_DATABASE: sparkless
      MYSQL_USER: sparkless
      MYSQL_PASSWORD: sparkless
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 2s
      timeout: 5s
      retries: 20

