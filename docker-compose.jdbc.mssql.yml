# SQL Server service for local JDBC integration tests.
#
# Start:   docker compose -f docker-compose.jdbc.mssql.yml up -d
# Stop:    docker compose -f docker-compose.jdbc.mssql.yml down
#
# Then set:
#   export SPARKLESS_TEST_JDBC_MSSQL_URL="jdbc:sqlserver://localhost:1433;databaseName=sparkless;encrypt=false;trustServerCertificate=true"
#   export SPARKLESS_TEST_JDBC_MSSQL_USER=sa
#   export SPARKLESS_TEST_JDBC_MSSQL_PASSWORD="Sparkless123!"
#
# Create tables:
#   docker exec -i sparkless-mssql /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Sparkless123!" -C -d sparkless -i /dev/stdin < tests/sql/ddl/mssql.sql

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sparkless-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Sparkless123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Sparkless123!\" -C -Q \"SELECT 1\" 1>/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

