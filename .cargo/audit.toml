[advisories]
ignore = [
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0020",
    "RUSTSEC-2025-0134",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2026-0041",
    "RUSTSEC-2026-0044",
    "RUSTSEC-2026-0048",
    "RUSTSEC-2026-0049",
    # rustls-webpki advisories pulled in via optional JDBC MSSQL (`tiberius` -> `tokio-rustls` -> `rustls`).
