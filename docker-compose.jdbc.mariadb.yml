# MariaDB service for local JDBC integration tests.
#
# Start:   docker compose -f docker-compose.jdbc.mariadb.yml up -d
# Stop:    docker compose -f docker-compose.jdbc.mariadb.yml down
#
# Then set:
#   export SPARKLESS_TEST_JDBC_MARIADB_URL="jdbc:mariadb://localhost:3307/sparkless"
#   export SPARKLESS_TEST_JDBC_MARIADB_USER=sparkless
#   export SPARKLESS_TEST_JDBC_MARIADB_PASSWORD=sparkless
#
# Create tables:
#   docker exec -i sparkless-mariadb mariadb -usparkless -psparkless sparkless < tests/sql/ddl/mariadb.sql

services:
  mariadb:
    image: mariadb:10.11
    container_name: sparkless-mariadb
    environment:
      MARIADB_DATABASE: sparkless
      MARIADB_USER: sparkless
      MARIADB_PASSWORD: sparkless
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 2s
      timeout: 5s
      retries: 20

